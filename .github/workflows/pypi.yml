name: Publish to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build source distribution
        run: python -m build --sdist --outdir dist

      - name: Upload source distribution
        uses: actions/upload-artifact@v5
        with:
          name: source-distribution
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: wheels-linux-x86-64
            architectures: x86_64

          - os: windows-latest
            artifact-name: wheels-windows-x86-64
            architectures: AMD64

          - os: macos-15
            artifact-name: wheels-macos
            architectures: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install libomp
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install libomp
          PREFIX=$(brew --prefix libomp)
          echo "CPPFLAGS=-I$PREFIX/include" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$PREFIX/lib" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$PREFIX" >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS: ${{ matrix.architectures }}
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=15.0"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_TEST_COMMAND: >
            python -c "import quantlop"
          CIBW_TEST_REQUIRES: "pennylane"
        with:
          output-dir: wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact-name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions to PyPI
    needs:
      - build-sdist
      - build-wheels

    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/quantlop

    permissions:
      id-token: write

    steps:
      - name: Download source distribution
        uses: actions/download-artifact@v6
        with:
          name: source-distribution
          path: dist

      - name: Download wheels
        uses: actions/download-artifact@v6
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Display distribution files
        run: ls -la dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
